<!DOCTYPE Html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{% block title %}sifr notes{% endblock %}</title>
        <link rel="stylesheet" href="/static/style.css" />
        <script scr="https://unpkg.com/htmx.org@1.9.12" defer></script>
    </head>

    <body>
        <div class="app-shell">
            <!-- Sidebar Section -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <a href="/notes class="brand">
                        <span class="brand-mark">◈</span> sifr <!-- lozenge / diamond -->
                    </a>
                </div>
                
                <nav class="sidebar-nav">
                    <a href="/notes" class="nav-link {% if active_page == 'notes' %}active{% endif %}">
                        <span class="nav-icon">▤</span>all notes
                    </a>

                <!-- Tags section -->
                    {% if tags %}
                        <span clas="nav-section-label">tags</span>
                        {% for tag in tags %}
                            <a href="/notes?tag={{ tag.name }}" class="nav-link {% if active_tag == tag.name %}active {% endif %}">
                                <span class="nav-icon">#</span> {{ tag.name }}
                            </a>
                        {% endfor %}
                    {% endif %}
                </nav>

                <div class="sidebar-footer">
                    <form action="/auth/logout" method="post">
                        <button type="submit" class="logout-btn">Signout</button>
                    </form>
                </div>
            </aside>

            <!-- Main Section -->
            <main class="main-content">

                {% if flash %}
                    <div class="flash flash-{{ flash.category }}"> {{ flash.message }}</div>
                {% endif %}

                {% block content %} {% endblock %}
            </main>
        </div>
    </body>
</html>
